{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-md mx-auto mt-20 p-8 glass-panel rounded-2xl relative overflow-hidden">
    <!-- Decorative background glow -->
    <div
        class="absolute -top-10 -right-10 w-32 h-32 bg-pink-500 rounded-full mix-blend-screen filter blur-[40px] opacity-30">
    </div>
    <div
        class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-500 rounded-full mix-blend-screen filter blur-[40px] opacity-30">
    </div>

    <div class="relative z-10 text-center mb-8">
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-gray-400 text-sm">Sign in to your Time Capsule account.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="relative z-10 space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Display Name</label>
            <input type="text" name="name" required placeholder="Future You"
                class="w-full px-4 py-3 rounded-lg glass-input text-white placeholder-gray-500 transition-all">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">WhatsApp Number (with country code)</label>
            <input type="text" name="whatsapp_number" required placeholder="+1234567890"
                class="w-full px-4 py-3 rounded-lg glass-input text-white placeholder-gray-500 transition-all">
        </div>

        <button type="submit"
            class="w-full py-4 rounded-lg bg-gradient-to-r from-purple-600 to-pink-600 font-bold text-lg hover:from-purple-500 hover:to-pink-500 transition-all shadow-[0_0_20px_rgba(236,72,153,0.3)]">
            Send OTP to WhatsApp
        </button>
    </form>
</div>
{% endblock %}
