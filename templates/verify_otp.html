{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-md mx-auto mt-20 p-8 glass-panel rounded-2xl">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold mb-2">Verify WhatsApp</h2>
        <p class="text-gray-400 text-sm">We sent a secure code to your number.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">6-Digit OTP</label>
            <input type="text" name="otp" required placeholder="000000" maxlength="6"
                class="w-full px-4 py-3 rounded-lg glass-input text-white text-center text-2xl tracking-widest placeholder-gray-600 transition-all">
        </div>

        <button type="submit"
            class="w-full py-4 rounded-lg bg-gradient-to-r from-blue-600 to-purple-600 font-bold text-lg hover:from-blue-500 hover:to-purple-500 transition-all shadow-[0_0_20px_rgba(147,51,234,0.3)]">
            Verify & Enter
        </button>
    </form>
</div>
{% endblock %}
